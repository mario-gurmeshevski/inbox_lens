<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Email Reader</title>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="setup-container">
      <div class="setup-card">
        <div class="setup-header">
          <i
            data-lucide="lock"
            style="width: 32px; height: 32px; color: var(--accent)"
          ></i>
          <h1>Login</h1>
          <p>Enter your dashboard password to continue.</p>
        </div>

        {% if error %}
        <div class="setup-error">
          <i data-lucide="alert-circle" style="width: 16px; height: 16px"></i>
          {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/login" class="setup-form">
          <input type="hidden" name="next" value="{{ next }}" />

          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-field">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                autofocus
                required
              />
              <button
                type="button"
                class="password-toggle"
                onclick="togglePassword('password')"
                aria-label="Show password"
              >
                <i data-lucide="eye" style="width: 16px; height: 16px"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="setup-btn">
            <i data-lucide="log-in" style="width: 16px; height: 16px"></i>
            Log In
          </button>
        </form>
      </div>
    </div>
    <script>
      lucide.createIcons();
      function togglePassword(id){
        const i=document.getElementById(id);
        const show=i.type==='password';
        i.type=show?'text':'password';
        i.parentElement.querySelector('.password-toggle i').setAttribute('data-lucide',show?'eye-off':'eye');
        lucide.createIcons();
      }
    </script>
  </body>
</html>
