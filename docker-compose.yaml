services:
  web:
    image: ghcr.io/mario-gurmeshevski/inbox_lens:latest
    build: .
    volumes:
      - inbox-lens-data:/app/src/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    environment:
      - HOST_IP=${HOST_IP:-}
    labels:
      inbox-lens.self: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "/app/src/scripts/healthcheck.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  inbox-lens-data:
