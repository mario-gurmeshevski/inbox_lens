<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Email Reader{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/sse.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <nav>
      <a href="/" class="brand">
        <i data-lucide="mail" style="width: 20px; height: 20px"></i>
        Email Reader
      </a>
      <div class="nav-links">
        <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">
          <i
            data-lucide="layout-dashboard"
            style="width: 16px; height: 16px"
          ></i>
          <span class="nav-label">Dashboard</span>
        </a>
        <a
          href="/emails"
          class="{% if '/emails' in request.url.path %}active{% endif %}"
        >
          <i data-lucide="inbox" style="width: 16px; height: 16px"></i>
          <span class="nav-label">Emails</span>
        </a>
        <a
          href="/keywords"
          class="{% if '/keywords' in request.url.path %}active{% endif %}"
        >
          <i data-lucide="tags" style="width: 16px; height: 16px"></i>
          <span class="nav-label">Keywords</span>
        </a>
        <a
          href="/account"
          class="{% if request.url.path == '/account' %}active{% endif %}"
        >
          <i data-lucide="user" style="width: 16px; height: 16px"></i>
          <span class="nav-label">Account</span>
        </a>
        <a
          href="/settings"
          class="nav-spacer {% if request.url.path == '/settings' %}active{% endif %}"
        >
          <i data-lucide="settings" style="width: 16px; height: 16px"></i>
        </a>
        {% if request.session.get("authed") %}
        <form
          method="post"
          action="/logout"
          style="display: inline; margin-left: 0.5rem"
        >
          <button
            type="submit"
            class="nav-link-btn"
            aria-label="Log out"
            title="Log out"
          >
            <i data-lucide="log-out" style="width: 16px; height: 16px"></i>
          </button>
        </form>
        {% endif %}
      </div>
    </nav>
    <div class="container" hx-ext="sse" sse-connect="/api/events">
      <div
        id="update-banner"
        hx-get="/partials/update-banner"
        hx-trigger="load, sse:update_available from:/api/events"
        hx-swap="outerHTML"
      ></div>
      <div id="action-status">
        {% if task_running %}
        <div
          hx-get="/api/status"
          hx-trigger="load"
          hx-target="#action-status"
          hx-swap="innerHTML"
        ></div>
        {% endif %}
      </div>
      {% block content %}{% endblock %}
    </div>
    <script>
      lucide.createIcons();
      document.body.addEventListener("htmx:afterSwap", function () {
        lucide.createIcons();
      });

      function togglePassword(id) {
        const i = document.getElementById(id);
        const show = i.type === "password";
        i.type = show ? "text" : "password";
        i.parentElement
          .querySelector(".password-toggle i")
          .setAttribute("data-lucide", show ? "eye-off" : "eye");
        lucide.createIcons();
      }

      function kwEdit(span) {
        const chip = span.closest(".kw-chip");
        if (!chip) return;
        span.style.display = "none";
        const form = chip.querySelector(".kw-edit-form");
        if (!form) return;
        form.classList.add("is-editing");
        const input = form.querySelector(".kw-edit-input");
        input.setAttribute(
          "size",
          Math.max(4, Math.min(20, input.value.length + 1))
        );
        input.focus();
        const val = input.value.length;
        input.setSelectionRange(val, val);
      }

      function kwEditKey(e) {
        if (e.key === "Escape") {
          e.preventDefault();
          e.target.blur();
        }
        if (e.key === "Enter") {
          e.preventDefault();
          e.target.closest("form").requestSubmit();
        }
      }

      function kwCancelEdit(input) {
        const form = input.closest(".kw-edit-form");
        if (!form) return;
        const old = form.querySelector('input[name="old_word"]');
        if (old) input.value = old.value;
        form.classList.remove("is-editing");
        const chip = form.closest(".kw-chip");
        const span = chip && chip.querySelector(".kw-word");
        if (span) span.style.display = "";
      }

      (function () {
        var fileInput = document.getElementById("kw-import-file");
        if (!fileInput) return;
        var form = fileInput.closest(".kw-import-form");
        var label = fileInput.parentElement.querySelector(".kw-file-name");

        fileInput.addEventListener("change", function () {
          var name = fileInput.files && fileInput.files[0]
            ? fileInput.files[0].name
            : "No file chosen";
          if (label) {
            label.textContent = name;
            label.style.color = "";
          }
        });

        if (form) {
          form.addEventListener("submit", function (e) {
            if (!fileInput.files || !fileInput.files[0]) {
              e.preventDefault();
              if (label) {
                label.textContent = "Please choose a file first.";
                label.style.color = "var(--danger, #dc2626)";
              }
              fileInput.focus();
            }
          });
        }
      })();

      (function () {
        var sseRetries = 0;
        var maxRetries = 10;

        function reconnectSSE() {
          var container = document.querySelector("[sse-connect]");
          if (!container) container = document.querySelector(".container");
          if (container) {
            sseRetries++;
            console.log("SSE reconnecting... attempt " + sseRetries);
            htmx.removeExtension("sse");
            htmx.defineExtension("sse", htmx._sseExtension);
            htmx.process(container);
          }
        }

        document.body.addEventListener("htmx:sseError", function (e) {
          if (sseRetries < maxRetries) {
            var delay = Math.min(5000 * (sseRetries + 1), 30000);
            setTimeout(reconnectSSE, delay);
          }
        });

        document.body.addEventListener("htmx:sseOpen", function () {
          sseRetries = 0;
        });
      })();
    </script>
  </body>
</html>
