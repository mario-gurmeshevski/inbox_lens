<div>
  <div class="account-modal-header">
    <i data-lucide="user" class="icon-xl"></i>
    <h2>Email Account</h2>
    <p>Your connected email account.</p>
  </div>
  <div class="account-info">
    <div class="account-field">
      <span class="account-label">Email</span>
      <span class="account-value">{{ email_user }}</span>
    </div>
    <div class="account-field">
      <span class="account-label">IMAP Server</span>
      <span class="account-value">{{ imap_server }}</span>
    </div>
    <div class="account-field">
      <span class="account-label">Password</span>
      <span class="account-value">{{ masked_pass }}</span>
    </div>
  </div>
  <div class="account-actions">
    <button type="button" class="btn btn-lg" onclick="closeAccountModal()">
      <i data-lucide="x" class="icon"></i>
      Close
    </button>
    <form method="post"
          action="/account/disconnect"
          data-confirm="This will disconnect your account and permanently delete all locally cached emails. You can reconnect later, but your messages will need to be re-fetched from the server."
          data-confirm-title="Disconnect account?"
          data-confirm-tone="danger"
          data-confirm-label="Disconnect">
      <button type="submit" class="btn btn-lg btn-danger">
        <i data-lucide="log-out" class="icon"></i>
        Disconnect
      </button>
    </form>
  </div>
</div>
