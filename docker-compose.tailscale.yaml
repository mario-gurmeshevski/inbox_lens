services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: inbox-lens-tailscale
    hostname: inbox-lens
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
      - TS_USERSPACE=true
      # - TS_AUTHKEY=${TS_AUTHKEY}
    volumes:
      - ./tailscale-state:/var/lib/tailscale
      - ts-socket:/var/run/tailscale
      - ts-tmp:/tmp
    cap_add:
      - net_admin
      - net_raw
    restart: unless-stopped

  tailscale-status:
    image: tailscale/tailscale:latest
    container_name: inbox-lens-ts-status
    environment:
      - TS_SERVE_HTTPS=${TS_SERVE_HTTPS:-true}
    volumes:
      - ts-socket:/var/run/tailscale
      - ts-tmp:/tmp
      - ts-shared:/shared
    entrypoint: ["sh", "-c"]
    command:
      - |
        export PATH=/usr/local/bin:$PATH
        while true; do
          tailscale status --json > /shared/status.json 2>/dev/null || true;
          chmod 644 /shared/status.json 2>/dev/null || true;

          if grep -q 'NeedsLogin' /shared/status.json 2>/dev/null; then
            rm -f /shared/website_shown /shared/serve_done 2>/dev/null || true;
            if [ ! -s /shared/login_url.txt ]; then
              if [ ! -f /shared/login_pid ] || ! kill -0 $$(cat /shared/login_pid 2>/dev/null) 2>/dev/null; then
                tailscale login > /shared/login_raw.txt 2>&1 &
                echo $$! > /shared/login_pid;
              fi;

              grep -o 'https://login.tailscale.com/[^ ]*' /shared/login_raw.txt > /shared/login_url.txt 2>/dev/null || true;
              chmod 644 /shared/login_url.txt 2>/dev/null || true;

              if [ -s /shared/login_url.txt ]; then
                echo "================================================"
                echo "  TAILSCALE LOGIN REQUIRED:"
                cat /shared/login_url.txt
                echo "================================================"
              fi
            fi;
          else
            rm -f /shared/login_url.txt /shared/login_raw.txt /shared/login_pid 2>/dev/null || true;

            if [ "$${TS_SERVE_HTTPS:-true}" = "true" ] && [ ! -f /shared/serve_done ]; then
              if tailscale serve --bg --https=443 http://localhost:8000 >/shared/serve_raw.txt 2>&1; then
                touch /shared/serve_done;
              fi;
            fi;

            if [ ! -f /shared/website_shown ]; then

              DNS_NAME=$$(grep -o '"DNSName": *"[^"]*"' /shared/status.json | head -1 | cut -d'"' -f4 | sed 's/\.$$//');
              if [ -n "$$DNS_NAME" ]; then
                echo "================================================";
                if [ -f /shared/serve_done ]; then
                  echo "  WEBSITE: https://$${DNS_NAME}";
                fi;
                echo "================================================";
                touch /shared/website_shown;
              fi;
            fi;
          fi;
          sleep 3;
        done
    restart: unless-stopped

  web:
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
    volumes:
      - ts-shared:/shared

volumes:
  ts-socket:
  ts-shared:
  ts-tmp:
