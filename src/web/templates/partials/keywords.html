{% if kw_msg %}
  <div id="kw-status"
       class="status-box status-dismissable {% if kw_msg_ok %}status-done{% else %}status-error{% endif %}">
    <i data-lucide="{% if kw_msg_ok %}check-circle{% else %}alert-circle{% endif %}"
       class="icon-md"></i>
    <span>{{ kw_msg }}</span>
    <button type="button"
            class="status-close"
            aria-label="Dismiss"
            onclick="this.parentElement.remove()">
      <i data-lucide="x" class="icon-sm"></i>
    </button>
  </div>
  <script src="/static/js/keywords.js"></script>
{% endif %}
<form hx-post="/keywords/category/add"
      hx-target="#keywords-cards"
      hx-swap="innerHTML"
      class="add-cat-form">
  <input type="number"
         name="level"
         min="1"
         placeholder="Priority level (e.g. 8)"
         required />
  <button type="submit" class="btn btn-sm">
    <i data-lucide="folder-plus" class="icon-sm"></i>
    Add category
  </button>
</form>
<div class="kw-cards">
  {% for level in levels %}
    <div class="detail-card kw-card">
      <div class="kw-card-header">
        <div class="kw-card-header-label">
          <span class="badge badge-{{ level | priority_bucket }}">Priority {{ level }}</span>
          <span class="count">{{ categories[level] | length }} word(s)</span>
        </div>
        <form hx-post="/keywords/category/remove"
              hx-target="#keywords-cards"
              hx-swap="innerHTML"
              hx-confirm="This will remove priority {{ level }} and every word assigned to it."
              data-confirm-title="Remove priority {{ level }}?"
              data-confirm-tone="danger"
              data-confirm-label="Remove"
              class="inline-form">
          <input type="hidden" name="level" value="{{ level }}" />
          <button type="submit" class="btn btn-danger btn-sm remove-cat-btn">
            <i data-lucide="trash-2" class="icon-sm"></i>
            Remove
          </button>
        </form>
      </div>
      <div class="words">
        {% for word in categories[level] %}
          <div class="chip">
            <span class="word"
                  tabindex="0"
                  role="button"
                  title="Click to edit"
                  onclick="kwEdit(this)"
                  onkeydown=" if (event.key === 'Enter') { event.preventDefault(); kwEdit(this); } ">{{ word }}</span>
            <form hx-post="/keywords/word/edit"
                  hx-target="#keywords-cards"
                  hx-swap="innerHTML"
                  class="edit-form">
              <input type="hidden" name="level" value="{{ level }}" />
              <input type="hidden" name="old_word" value="{{ word }}" />
              <input type="text"
                     name="new_word"
                     value="{{ word }}"
                     class="edit-input"
                     autocomplete="off"
                     onkeydown="kwEditKey(event)"
                     onblur="kwCancelEdit(this)" />
            </form>
            <form hx-post="/keywords/word/remove"
                  hx-target="#keywords-cards"
                  hx-swap="innerHTML"
                  class="inline-form">
              <input type="hidden" name="level" value="{{ level }}" />
              <input type="hidden" name="word" value="{{ word }}" />
              <button type="submit"
                      class="remove-btn"
                      aria-label="Remove word"
                      title="Remove">
                <i data-lucide="x" class="icon-sm"></i>
              </button>
            </form>
          </div>
        {% endfor %}
      </div>
      <form hx-post="/keywords/word/add"
            hx-target="#keywords-cards"
            hx-swap="innerHTML"
            class="add-form">
        <input type="hidden" name="level" value="{{ level }}" />
        <input type="text"
               name="word"
               class="add-input"
               placeholder="Add word or phrase…"
               required />
        <button type="submit" class="btn btn-sm">
          <i data-lucide="plus" class="icon-sm"></i>
          Add
        </button>
      </form>
    </div>
  {% endfor %}
  {% if not levels %}
    <div class="detail-card">
      <p class="settings-desc">No priority categories. Add one above.</p>
    </div>
  {% endif %}
</div>
