<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Email Reader{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/sse.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="/static/theme.css" />
    <link rel="stylesheet" href="/static/style.css" />
    {% block styles %}{% endblock %}
  </head>
  <body>
    <nav>
      <a href="/" class="brand">
        <i data-lucide="mail" class="icon-lg"></i>
        Email Reader
      </a>
      <div class="nav-links">
        <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">
          <i data-lucide="layout-dashboard" class="icon"></i>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="/emails"
           class="{% if '/emails' in request.url.path %}active{% endif %}">
          <i data-lucide="inbox" class="icon"></i>
          <span class="nav-label">Emails</span>
        </a>
        <a href="/keywords"
           class="{% if '/keywords' in request.url.path %}active{% endif %}">
          <i data-lucide="tags" class="icon"></i>
          <span class="nav-label">Keywords</span>
        </a>
        <button type="button"
                class="nav-link-btn account-nav-btn"
                aria-label="Account"
                title="Account"
                hx-get="/partials/account"
                hx-target="#account-modal-body"
                hx-swap="innerHTML"
                onclick="openAccountModal()">
          <i data-lucide="user" class="icon"></i>
          <span class="nav-label">Account</span>
        </button>
        <a href="/settings"
           class="nav-spacer {% if request.url.path == '/settings' %}active{% endif %}">
          <i data-lucide="settings" class="icon"></i>
        </a>
        {% if request.session.get("authed") %}
          <form method="post" action="/logout" class="inline-form">
            <button type="submit"
                    class="nav-link-btn"
                    aria-label="Log out"
                    title="Log out">
              <i data-lucide="log-out" class="icon"></i>
            </button>
          </form>
        {% endif %}
      </div>
    </nav>
    <div class="container" hx-ext="sse" sse-connect="/api/events">
      <div id="update-banner"
           hx-get="/partials/update-banner"
           hx-trigger="load, sse:update_available from:/api/events"
           hx-swap="outerHTML"></div>
      <div id="action-status">
        {% if task_running %}
          <div hx-get="/api/status"
               hx-trigger="load"
               hx-target="#action-status"
               hx-swap="innerHTML"></div>
        {% endif %}
      </div>
      {% block content %}
      {% endblock %}
    </div>
    <div id="account-modal" class="account-modal" hidden>
      <div class="account-modal-backdrop" onclick="closeAccountModal()"></div>
      <div class="account-modal-card"
           role="dialog"
           aria-modal="true"
           aria-label="Email Account">
        <button type="button"
                class="account-modal-close"
                aria-label="Close"
                onclick="closeAccountModal()">
          <i data-lucide="x" class="icon-md"></i>
        </button>
        <div id="account-modal-body"></div>
      </div>
    </div>
    <div id="confirm-modal"
         class="confirm-modal"
         hidden
         role="dialog"
         aria-modal="true"
         aria-labelledby="confirm-title"
         aria-describedby="confirm-message">
      <div class="confirm-backdrop" data-confirm-cancel></div>
      <div class="confirm-card">
        <div id="confirm-icon" class="confirm-icon" aria-hidden="true">
          <i data-lucide="alert-triangle" class="icon-md"></i>
        </div>
        <h2 id="confirm-title" class="confirm-title"></h2>
        <p id="confirm-message" class="confirm-message"></p>
        <div class="confirm-actions">
          <button type="button" class="btn" data-confirm-cancel>Cancel</button>
          <button type="button" class="btn btn-danger" id="confirm-ok-btn">Confirm</button>
        </div>
      </div>
    </div>
    {% block scripts %}
    {% endblock %}
    <script src="/static/js/base.js"></script>
  </body>
</html>
