services:
  web:
    image: ghcr.io/mario-gurmeshevski/inbox_lens:latest
    build: .
    volumes:
      - ./src/data:/app/src/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - HOST_IP=${HOST_IP:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
