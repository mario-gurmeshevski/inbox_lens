{% extends "base.html" %}
{% block title %}
  {{ email.subject or "Email Detail"
  }}
{% endblock %}
{% block styles %}
  <link rel="stylesheet" href="/static/email_detail.css" />
{% endblock %}
{% block content %}
  <div class="back-row">
    <a href="/emails" class="btn btn-sm">
      <i data-lucide="arrow-left" class="icon-sm"></i>
      Back to Emails
    </a>
  </div>
  <div id="email-detail-content"
       hx-get="/partials/email-detail/{{ email_hash }}"
       hx-trigger="sse:refresh"
       hx-swap="innerHTML">{% include "partials/email_detail_content.html" %}</div>
{% endblock %}
