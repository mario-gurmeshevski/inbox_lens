{% extends "auth_base.html" %}
{% block title %}Setup — Email Reader{% endblock %}
{% block card %}
  <div class="setup-header">
    <i data-lucide="mail" class="icon-2xl"></i>
    <h1>Email Reader Setup</h1>
    <p>Connect your email account to get started.</p>
  </div>
  {% if error %}
    <div class="setup-error">
      <i data-lucide="alert-circle" class="icon"></i>
      {{ error }}
    </div>
  {% endif %}
  <form method="post" action="/setup" class="setup-form">
    <div class="form-group">
      <label for="imap_server">IMAP Server</label>
      <input type="text"
             id="imap_server"
             name="imap_server"
             value="{{ imap_server }}"
             placeholder="imap.gmail.com"
             required />
      <span class="form-hint">Default: imap.gmail.com</span>
    </div>
    <div class="form-group">
      <label for="email_user">Email Address</label>
      <input type="email"
             id="email_user"
             name="email_user"
             value="{{ email_user }}"
             placeholder="you@gmail.com"
             required />
    </div>
    <div class="form-group">
      <label for="email_pass">App Password</label>
      <div class="password-field">
        <input type="password"
               id="email_pass"
               name="email_pass"
               placeholder="Enter your app password"
               required />
        <button type="button"
                class="password-toggle"
                onclick="togglePassword('email_pass')"
                aria-label="Show password">
          <i data-lucide="eye" class="icon"></i>
        </button>
      </div>
      <span class="form-hint">
        <a href="https://myaccount.google.com/apppasswords"
           target="_blank"
           rel="noopener">Generate an App Password</a>
      </span>
    </div>
    <button type="submit" class="btn btn-lg">
      <i data-lucide="log-in" class="icon"></i>
      Connect & Test
    </button>
  </form>
{% endblock %}
