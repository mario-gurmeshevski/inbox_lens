{% if is_docker and update.update_available and not update.banner_dismissed %}
  <div id="update-banner"
       class="update-banner"
       hx-get="/partials/update-banner"
       hx-trigger="sse:update_available from:/api/events"
       hx-swap="outerHTML">
    <a href="/settings" class="update-banner-body">
      <i data-lucide="download-cloud" class="icon-md"></i>
      <span>A new update is available ({{ update.latest_version }}). Click here to
      update.</span>
    </a>
    <form method="post"
          action="/api/update/dismiss"
          hx-post="/api/update/dismiss"
          hx-target="#update-banner"
          hx-swap="outerHTML"
          class="update-banner-dismiss">
      <button type="submit" aria-label="Dismiss update banner" title="Dismiss">
        <i data-lucide="x" class="icon"></i>
      </button>
    </form>
  </div>
{% else %}
  <div id="update-banner" hx-swap="outerHTML"></div>
{% endif %}
