<div class="cards">
  <div class="card">
    <h3>Total Emails</h3>
    <div class="value total">{{ total }}</div>
  </div>
  <div class="card">
    <h3>Fetched</h3>
    <div class="value fetched">{{ counts.fetched }}</div>
  </div>
  <div class="card">
    <h3>Checked</h3>
    <div class="value checked">{{ counts.checked }}</div>
  </div>
  <div class="card">
    <h3>Unscanned</h3>
    <div class="value unscanned">{{ unscanned }}</div>
  </div>
</div>
